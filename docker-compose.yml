services:
  db:
    image: postgres:16
    container_name: ukrokultur_postgres
    environment:
      POSTGRES_DB: ukrokultur
      POSTGRES_USER: ukro
      POSTGRES_PASSWORD: ukro_pass
    ports:
      - "5433:5432"
    volumes:
      - ukrokultur_db:/var/lib/postgresql/data

volumes:
  ukrokultur_db:
