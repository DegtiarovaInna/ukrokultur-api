spring.application.name=ukrokultur-api

# DB (local)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:ukrokultur}
spring.datasource.username=${DB_USER:ukro}
spring.datasource.password=${DB_PASSWORD:ukro_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate 
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# Server
server.port=${PORT:8080}
server.address=0.0.0.0

# Supabase (Storage) - optional for local dev
supabase.url=${SUPABASE_URL:}
supabase.serviceRoleKey=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:}
supabase.publicBaseUrl=${SUPABASE_PUBLIC_BASE_URL:}

# uploads (multipart)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# hCaptcha
hcaptcha.enabled=${HCAPTCHA_ENABLED:true}
hcaptcha.secret=${HCAPTCHA_SECRET:}

# Contact mail (Resend)
contact.mail.to=${CONTACT_MAIL_TO:}
contact.mail.from=${RESEND_FROM:}
resend.apiKey=${RESEND_API_KEY:}

# Profile (set in IDE run config: dev)
# spring.profiles.active=dev

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiresMinutes=${JWT_EXPIRES_MINUTES:480}
jwt.issuer=${JWT_ISSUER:ukrokultur-api}

# Swagger off by default in prod (can be overridden by profile)
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Admins
admin1.email=${ADMIN1_EMAIL:}
admin1.password=${ADMIN1_PASSWORD:}
admin2.email=${ADMIN2_EMAIL:}
admin2.password=${ADMIN2_PASSWORD:}

# ===== CORS (frontend -> backend) =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type
app.cors.exposed-headers=Authorization

# ===== Actuator =====
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

spring.cache.type=caffeine
# ===== Rate limiting for /contact (internal) =====
contact.rate-limit.enabled=true
contact.rate-limit.max-requests=5
contact.rate-limit.window=1m


# ===== Client IP behind proxy (enable ONLY when behind trusted proxy) =====
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:none}

# ===== Global timeouts for ALL outbound HTTP calls (RestClient etc.) =====
spring.http.clients.connect-timeout=5s
spring.http.clients.read-timeout=10s

# ===== Auth cookie (server-guard) =====
security.auth.cookie.name=admin_session
security.auth.cookie.path=/
security.auth.cookie.sameSite=Lax
security.auth.cookie.secure=false